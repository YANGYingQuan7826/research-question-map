  const { Transformer } = markmap;
  const { Markmap } = markmap;
  const transformer = new Transformer();
  const { root, features } = transformer.transform(MD);
  
  function countNodes(node) {
    let c = 1;
    (node.children||[]).forEach(ch => c += countNodes(ch));
    return c;
  }
  document.getElementById('info').textContent = countNodes(root) + ' 节点';

  const mm = Markmap.create('#mindmap', {
    autoFit: true, duration: 300, maxWidth: 320,
    paddingX: 12, colorFreezeLevel: 3, initialExpandLevel: 1,
  }, root);

  let searchTimer;
  document.getElementById('search').addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim().toLowerCase();
    searchTimer = setTimeout(() => {
      if (!q) {
        applyFold(root, n => n.depth >= 2);
        mm.setData(root); mm.fit(); return;
      }
      const matched = new Set();
      function markMatches(n) {
        const text = (n.content || '').toLowerCase();
        if (text.includes(q)) {
          matched.add(n);
          let p = n.parent;
          while (p) { matched.add(p); p = p.parent; }
        }
        (n.children||[]).forEach(markMatches);
        (n._children||[]).forEach(markMatches);
      }
      root.descendants().forEach(d => {
        if (d._children) { d.children = d._children; d._children = null; }
      });
      markMatches(root);
      applyFold(root, n => !matched.has(n) && n.depth >= 1);
      mm.setData(root);
      if (matched.size > 0) mm.fit();
    }, 250);
  });

  function applyFold(node, shouldFold) {
    if (node.depth >= 1) {
      node.payload = node.payload || {};
      node.payload.fold = shouldFold(node) ? 1 : 0;
    }
    (node.children||[]).forEach(ch => applyFold(ch, shouldFold));
  }

  document.getElementById('btn-fit').onclick = () => mm.fit();
})();
